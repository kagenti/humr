{{- if .Values.ingress.enabled }}
{{- $domains := list .Values.domain }}
{{- range .Values.ingress.aliasDomains }}
{{- if . }}
{{- $domains = append $domains . }}
{{- end }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "humr.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- /* OneCLI: primary hostname (custom or onecli.{{ domain }}) */ -}}
    {{- if $.Values.onecli.externalHostname }}
    - host: {{ $.Values.onecli.externalHostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "humr.onecli.fullname" $ }}
                port:
                  name: web
    {{- end }}
    {{- range $domain := $domains }}
    - host: {{ printf "onecli.%s" $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "humr.onecli.fullname" $ }}
                port:
                  name: web
    - host: {{ printf "humr.%s" $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-ui" (include "humr.fullname" $) | trunc 63 | trimSuffix "-" }}
                port:
                  name: http
    {{- if $.Values.keycloak.enabled }}
    - host: {{ printf "keycloak.%s" $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "humr.keycloak.fullname" $ }}
                port:
                  name: http
    {{- end }}
    - host: {{ printf "humr-api.%s" $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-apiserver" (include "humr.fullname" $) | trunc 63 | trimSuffix "-" }}
                port:
                  name: http
    {{- end }}
{{- end }}
