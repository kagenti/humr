{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "humr.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: onecli.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "humr.onecli.fullname" . }}
                port:
                  name: web
{{- end }}
