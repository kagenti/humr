{{- if .Values.credentialsProxy.enabled }}
{{- $name := include "humr.credentialsProxy.secretsName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}

{{- $kekV1 := .Values.credentialsProxy.secretEncryptionKeys.v1 }}
{{- if not $kekV1 }}
  {{- if and $existing $existing.data.SECRET_ENCRYPTION_KEY_V1 }}
    {{- $kekV1 = index $existing.data "SECRET_ENCRYPTION_KEY_V1" | b64dec }}
  {{- else }}
    {{- $kekV1 = randBytes 32 }}
  {{- end }}
{{- end }}

{{- $macKey := .Values.credentialsProxy.oauthStateMacKey }}
{{- if not $macKey }}
  {{- if and $existing $existing.data.OAUTH_STATE_MAC_KEY }}
    {{- $macKey = index $existing.data "OAUTH_STATE_MAC_KEY" | b64dec }}
  {{- else }}
    {{- $macKey = randBytes 32 }}
  {{- end }}
{{- end }}

{{- $apiPass := .Values.credentialsProxy.db.apiPassword }}
{{- if not $apiPass }}
  {{- if and $existing $existing.data.DB_API_PASSWORD }}
    {{- $apiPass = index $existing.data "DB_API_PASSWORD" | b64dec }}
  {{- else }}
    {{- $apiPass = randAlphaNum 32 }}
  {{- end }}
{{- end }}

{{- $sidecarPass := .Values.credentialsProxy.db.sidecarPassword }}
{{- if not $sidecarPass }}
  {{- if and $existing $existing.data.DB_SIDECAR_PASSWORD }}
    {{- $sidecarPass = index $existing.data "DB_SIDECAR_PASSWORD" | b64dec }}
  {{- else }}
    {{- $sidecarPass = randAlphaNum 32 }}
  {{- end }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: credentials-proxy
type: Opaque
data:
  SECRET_ENCRYPTION_KEY_V1: {{ $kekV1 | b64enc | quote }}
  OAUTH_STATE_MAC_KEY: {{ $macKey | b64enc | quote }}
  DB_API_PASSWORD: {{ $apiPass | b64enc | quote }}
  DB_SIDECAR_PASSWORD: {{ $sidecarPass | b64enc | quote }}
  {{- if .Values.credentialsProxy.oauth.github.clientSecret }}
  OAUTH_GITHUB_CLIENT_SECRET: {{ .Values.credentialsProxy.oauth.github.clientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.credentialsProxy.oauth.google.clientSecret }}
  OAUTH_GOOGLE_CLIENT_SECRET: {{ .Values.credentialsProxy.oauth.google.clientSecret | b64enc | quote }}
  {{- end }}
{{- end }}
