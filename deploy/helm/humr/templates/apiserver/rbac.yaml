{{/*
API Server RBAC — ServiceAccount, Roles, RoleBindings (release ns + agent ns)
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "humr.apiserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
---
# Read-only Role in release namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "humr.apiserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "humr.apiserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "humr.apiserver.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "humr.apiserver.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Read/write Role in agent namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "humr.apiserver.serviceAccountName" . }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "humr.apiserver.serviceAccountName" . }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "humr.apiserver.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "humr.apiserver.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
