{{- if or .Values.apiServer.telegramEnabled .Values.apiServer.unifiedChannelEnabled }}
{{- $appName := printf "%s-apiserver" (include "humr.fullname" .) | trunc 63 | trimSuffix "-" }}
{{- $secretName := printf "%s-channel-secret" $appName }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $key := "" }}
{{- if .Values.apiServer.channelEncryptionKey }}
{{- $key = .Values.apiServer.channelEncryptionKey }}
{{- else if and $existing (index $existing.data "HUMR_CHANNEL_ENCRYPTION_KEY") }}
{{- $key = index $existing.data "HUMR_CHANNEL_ENCRYPTION_KEY" | b64dec }}
{{- else }}
{{- $key = randBytes 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
type: Opaque
data:
  HUMR_CHANNEL_ENCRYPTION_KEY: {{ $key | b64enc | quote }}
{{- end }}
