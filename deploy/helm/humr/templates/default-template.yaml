{{- if .Values.defaultTemplate.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.defaultTemplate.name }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    humr.ai/type: agent-template
data:
  spec.yaml: |
    version: humr.ai/v1
    image: {{ .Values.defaultTemplate.image }}
    description: {{ .Values.defaultTemplate.description | quote }}
    mounts:
      - path: /workspace
        persist: true
      - path: /home/agent
        persist: true
      - path: /tmp
        persist: false
    init: |
      #!/bin/bash
      # Seed workspace from image on first boot
      if [ ! -f /workspace/.initialized ]; then
        cp -rn /app/working-dir/. /workspace/ 2>/dev/null || true
        touch /workspace/.initialized
      fi
      if [ -f /workspace/requirements.txt ]; then
        pip install -r /workspace/requirements.txt
      fi
    env:
      - name: PORT
        value: "8080"
    resources:
      requests:
        cpu: {{ .Values.defaultTemplate.resources.requests.cpu | quote }}
        memory: {{ .Values.defaultTemplate.resources.requests.memory | quote }}
      limits:
        cpu: {{ .Values.defaultTemplate.resources.limits.cpu | quote }}
        memory: {{ .Values.defaultTemplate.resources.limits.memory | quote }}
    securityContext:
      readOnlyRootFilesystem: false
{{- end }}
