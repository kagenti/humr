{{- $appName := printf "%s-onecli" (include "humr.fullname" .) | trunc 63 | trimSuffix "-" }}
---
# OneCLI Service (gateway + web on same pod)
apiVersion: v1
kind: Service
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: onecli
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.onecli.gateway.port }}
      targetPort: gateway
      protocol: TCP
      name: gateway
    - port: {{ .Values.onecli.web.port }}
      targetPort: web
      protocol: TCP
      name: web
  selector:
    app.kubernetes.io/component: onecli
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# Persistent data for OneCLI gateway (auto-generated MITM CA, runtime config)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $appName }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: onecli
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.onecli.data.size }}
---
# Single Deployment: entrypoint.sh runs migrations, starts gateway (Rust) + web (Node.js)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: onecli
spec:
  replicas: {{ .Values.onecli.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: onecli
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "humr.labels" . | nindent 8 }}
        app.kubernetes.io/component: onecli
    spec:
      {{- include "humr.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h {{ include "humr.onecli.db.host" . }} -U {{ .Values.onecli.db.user }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
        {{- if .Values.keycloak.enabled }}
        - name: wait-for-keycloak
          image: {{ .Values.controller.caCertInitImage | default "busybox:stable" }}
          command: ["sh", "-c"]
          args:
            - |
              until wget -qO- http://{{ include "humr.keycloak.fullname" . }}:{{ .Values.keycloak.port }}/realms/{{ .Values.keycloak.realm }} >/dev/null 2>&1; do
                echo "Waiting for Keycloak..."
                sleep 2
              done
        {{- end }}
      containers:
        - name: onecli
          image: {{ .Values.onecli.image }}
          ports:
            - containerPort: {{ .Values.onecli.gateway.port }}
              name: gateway
            - containerPort: {{ .Values.onecli.web.port }}
              name: web
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "humr.onecli.db.password.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: {{ include "humr.onecli.postgres.dsn" . | quote }}
            - name: SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "humr.onecli.secrets.fullname" . }}
                  key: SECRET_ENCRYPTION_KEY
            - name: GATEWAY_PORT
              value: {{ .Values.onecli.gateway.port | quote }}
            - name: PORT
              value: {{ .Values.onecli.web.port | quote }}
            {{- if .Values.keycloak.enabled }}
            - name: AUTH_MODE
              value: "oauth"
            - name: OAUTH_ISSUER
              value: {{ include "humr.keycloak.issuer" . | quote }}
            - name: OAUTH_JWKS_URL
              value: "http://{{ include "humr.keycloak.fullname" . }}:{{ .Values.keycloak.port }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/certs"
            - name: OAUTH_AUDIENCE
              value: {{ .Values.onecli.oauth.audience | quote }}
            - name: OAUTH_CLIENT_ID
              value: {{ .Values.onecli.oauth.clientId | quote }}
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "humr.onecli.secrets.fullname" . }}
                  key: OAUTH_CLIENT_SECRET
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "humr.onecli.secrets.fullname" . }}
                  key: NEXTAUTH_SECRET
            - name: APP_URL
              value: {{ include "humr.url.onecli" . | quote }}
            - name: NEXT_PUBLIC_APP_URL
              value: {{ include "humr.url.onecli" . | quote }}
            - name: NEXTAUTH_URL
              value: {{ include "humr.url.onecli" . | quote }}
            - name: OAUTH_AUTHORIZATION_URL
              value: {{ printf "%s/realms/%s/protocol/openid-connect/auth" (include "humr.url.keycloak" .) .Values.keycloak.realm | quote }}
            - name: OAUTH_TOKEN_URL
              value: "http://{{ include "humr.keycloak.fullname" . }}:{{ .Values.keycloak.port }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/token"
            - name: OAUTH_USERINFO_URL
              value: "http://{{ include "humr.keycloak.fullname" . }}:{{ .Values.keycloak.port }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/userinfo"
            {{- else }}
            - name: AUTH_MODE
              value: "local"
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.onecli.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $appName }}-data
