{{- $secretName := include "humr.onecli.secrets.fullname" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $pgPassword := "" }}
{{- $secretEncKey := "" }}
{{- $nextauthSecret := "" }}
{{- if $existingSecret }}
  {{- $pgPassword = index $existingSecret.data "POSTGRES_PASSWORD" | b64dec }}
  {{- $secretEncKey = index $existingSecret.data "SECRET_ENCRYPTION_KEY" | b64dec }}
  {{- $nextauthSecret = index $existingSecret.data "NEXTAUTH_SECRET" | b64dec }}
{{- else }}
  {{- $pgPassword = default (randAlphaNum 32) .Values.onecli.postgres.password }}
  {{- /* SECRET_ENCRYPTION_KEY: gateway expects base64-encoded 32 bytes.
       randBytes N returns a base64 string of N random bytes, so no extra b64enc needed.
       The value stored here gets b64enc'd once more for K8s .data, then decoded by K8s
       at injection time, giving the gateway the base64 string it expects. */ -}}
  {{- $secretEncKey = default (randBytes 32) .Values.onecli.gateway.secretEncryptionKey }}
  {{- $nextauthSecret = default (randAlphaNum 32) .Values.onecli.web.nextauthSecret }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc | quote }}
  SECRET_ENCRYPTION_KEY: {{ $secretEncKey | b64enc | quote }}
  NEXTAUTH_SECRET: {{ $nextauthSecret | b64enc | quote }}
