{{- /* Shared PostgreSQL password (used by all services connecting to local postgres) */ -}}
{{- $pgSecretName := include "humr.postgres.secrets.fullname" . }}
{{- $existingPgSecret := lookup "v1" "Secret" .Release.Namespace $pgSecretName }}
{{- $pgPassword := "" }}
{{- if $existingPgSecret }}
  {{- $pgPassword = index $existingPgSecret.data "POSTGRES_PASSWORD" | b64dec }}
{{- else }}
  {{- /* Also check the legacy secret name for upgrades */ -}}
  {{- $legacySecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-onecli-secrets" (include "humr.fullname" .)) }}
  {{- if $legacySecret }}
    {{- $pgPassword = index $legacySecret.data "POSTGRES_PASSWORD" | b64dec }}
  {{- else }}
    {{- $pgPassword = default (randAlphaNum 32) .Values.postgres.password }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pgSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc | quote }}
---
{{- /* OneCLI-specific secret (encryption key only) */ -}}
{{- $onecliSecretName := include "humr.onecli.secrets.fullname" . }}
{{- $existingOnecliSecret := lookup "v1" "Secret" .Release.Namespace $onecliSecretName }}
{{- $secretEncKey := "" }}
{{- if $existingOnecliSecret }}
  {{- $secretEncKey = index $existingOnecliSecret.data "SECRET_ENCRYPTION_KEY" | b64dec }}
{{- else }}
  {{- /* Also check the legacy secret name for upgrades */ -}}
  {{- $legacySecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-onecli-secrets" (include "humr.fullname" .)) }}
  {{- if $legacySecret }}
    {{- $secretEncKey = index $legacySecret.data "SECRET_ENCRYPTION_KEY" | b64dec }}
  {{- else }}
    {{- /* SECRET_ENCRYPTION_KEY: gateway expects base64-encoded 32 bytes.
         randBytes N returns a base64 string of N random bytes, so no extra b64enc needed.
         The value stored here gets b64enc'd once more for K8s .data, then decoded by K8s
         at injection time, giving the gateway the base64 string it expects. */ -}}
    {{- $secretEncKey = default (randBytes 32) .Values.onecli.gateway.secretEncryptionKey }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $onecliSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_ENCRYPTION_KEY: {{ $secretEncKey | b64enc | quote }}
