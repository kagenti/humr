{{- $caCertCMName := include "humr.onecli.ca-cert.fullname" . }}
---
# Public CA cert for agent pods — populated by cluster:install from OneCLI's
# /api/container-config endpoint after the gateway auto-generates its MITM CA.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $caCertCMName }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
data:
  ca.crt: "# Populated by: mise run cluster:install"
