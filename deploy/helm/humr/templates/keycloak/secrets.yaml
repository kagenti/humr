{{- if .Values.keycloak.enabled }}
{{- $secretName := include "humr.keycloak.secrets.fullname" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $adminPassword := "" }}
{{- if .Values.keycloak.admin.password }}
  {{- /* Explicit password always wins (e.g. --set keycloak.admin.password=admin) */ -}}
  {{- $adminPassword = .Values.keycloak.admin.password }}
{{- else if $existingSecret }}
  {{- $adminPassword = index $existingSecret.data "KEYCLOAK_ADMIN_PASSWORD" | b64dec }}
{{- else }}
  {{- $adminPassword = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
type: Opaque
data:
  KEYCLOAK_ADMIN_PASSWORD: {{ $adminPassword | b64enc | quote }}
{{- end }}
