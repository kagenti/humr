{{- if .Values.keycloak.enabled }}
{{- $appName := include "humr.keycloak.fullname" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $appName }}-provision
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-provision
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "5"
spec:
  template:
    metadata:
      labels:
        {{- include "humr.labels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak-provision
    spec:
      restartPolicy: OnFailure
      containers:
        - name: config-cli
          image: {{ .Values.keycloak.configCliImage }}
          env:
            - name: KEYCLOAK_URL
              value: "http://{{ $appName }}:{{ .Values.keycloak.port }}"
            - name: KEYCLOAK_USER
              value: {{ .Values.keycloak.admin.user | quote }}
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "humr.keycloak.secrets.fullname" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: IMPORT_FILES_LOCATIONS
              value: "/config/*"
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
            - name: KEYCLOAK_AVAILABILITYCHECK_TIMEOUT
              value: "120s"
          volumeMounts:
            - name: realm-config
              mountPath: /config
      volumes:
        - name: realm-config
          configMap:
            name: {{ $appName }}-realm
{{- end }}
