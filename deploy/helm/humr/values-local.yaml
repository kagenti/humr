# Local dev: images built with docker and loaded into k3s directly.
# Used via: helm install -f values-local.yaml
# Pin Humr UI to plain `http://localhost:4444` so OAuth providers that
# only accept `http://localhost` (Google's OAuth, GitHub Enterprise's
# stricter callback validation, etc.) work in local dev. The api-server's
# OAuth callback lives at `${uiBaseUrl}/api/oauth/callback`, so this URL
# is what users register on the provider side.
#
# OneCLI's dashboard moves to `http://onecli.localhost:4444` (the chart's
# default convention). OneCLI's own Google OAuth callback may not work
# from that subdomain — accepted, since the new "Connect" flows live in
# Humr UI under #338 and OneCLI's dashboard is read-only on the migration
# path until OneCLI is removed entirely.
urls:
  ui: http://localhost:4444

ui:
  image:
    repository: humr-ui
    tag: latest
    pullPolicy: Never

apiServer:
  image:
    repository: humr-api-server
    tag: latest
    pullPolicy: Never

controller:
  image:
    repository: humr-controller
    tag: latest
    pullPolicy: Never
  agentImagePullPolicy: Never
  agentStorageClass: humr-rwx

nfsProvisioner:
  enabled: true

defaultTemplate:
  image:
    repository: humr-claude-code
    tag: latest
    pullPolicy: Never

googleWorkspaceTemplate:
  enabled: true
  image:
    repository: humr-google-workspace-agent
    tag: latest
    pullPolicy: Never

piAgentTemplate:
  enabled: true
  image:
    repository: humr-pi-agent
    tag: latest
    pullPolicy: Never

codeGuardianTemplate:
  enabled: true
  image:
    repository: humr-code-guardian
    tag: latest
    pullPolicy: Never

# Bootstrap a known dev/dev user for local cluster — never enabled in production.
keycloak:
  testUser:
    enabled: true
    username: dev
    password: dev
