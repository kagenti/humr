# -- Target namespace for agent workloads (instances, templates, schedules)
agentNamespace: humr-agents

# -- Shared local PostgreSQL instance
# Set enabled: false when using external/cloud DBs for all services.
postgres:
  enabled: true
  image: postgres:18-alpine
  user: humr
  # password is auto-generated if not set
  password: ""
  storage: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- OneCLI (credential proxy — gateway + web run in a single container)
onecli:
  # Single Docker image containing both Rust gateway and Node.js web app
  image: ghcr.io/onecli/onecli:1.14.1
  replicas: 1

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: humr
    password: ""
    database: onecli

  # -- Gateway settings (Rust binary, runs inside the OneCLI container)
  gateway:
    port: 10255
    # secretEncryptionKey: base64-encoded 32-byte key, auto-generated if not set
    secretEncryptionKey: ""

  # -- Web app settings (Node.js, runs inside the OneCLI container)
  # Runs in local mode (no OAuth). Set NEXTAUTH_SECRET + GOOGLE_CLIENT_ID +
  # GOOGLE_CLIENT_SECRET in env to enable OAuth.
  web:
    port: 10254

  # -- MITM CA: auto-generated by OneCLI gateway on first start.
  # Agent pods fetch the CA cert at startup via init container.
  data:
    size: 1Gi

  # -- Combined container resources
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Keycloak (OIDC identity provider)
keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak:26.2
  port: 8080

  # -- Admin credentials (for Keycloak admin console)
  admin:
    user: admin
    # password is auto-generated if not set
    password: ""

  # -- Realm and OIDC client configuration
  realm: humr
  clientId: humr-ui
  apiAudience: humr-api

  # -- Test user bootstrapped via realm import
  testUser:
    username: dev
    password: dev

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: humr
    password: ""
    database: keycloak

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Ingress (uses k3s built-in Traefik, accessed via port-forward on port 4444)
# Subdomains on both *.localtest.me and *.localhost (secure context):
#   humr.localhost:4444 / humr.localtest.me:4444 (UI)
#   humr-api.localhost:4444 / humr-api.localtest.me:4444 (API)
#   onecli.localhost:4444 / onecli.localtest.me:4444 (OneCLI)
ingress:
  enabled: true
  className: ""
  annotations: {}

# -- UI (nginx serving static SPA, reverse-proxies /api to API server)
ui:
  image: humr-ui:latest
  imagePullPolicy: Never
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- API Server
apiServer:
  image: humr-api-server:latest
  imagePullPolicy: Never
  port: 4000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Controller (Go reconciler + scheduler)
controller:
  image: humr-controller:latest
  imagePullPolicy: Never
  caCertInitImage: busybox:stable
  agentImagePullPolicy: Never
  replicas: 1
  # -- Idle timeout before auto-hibernating running instances (Go duration, 0 = disabled)
  idleTimeout: "1h"
  # -- Termination grace period in seconds for agent pods
  terminationGracePeriod: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Default agent template
defaultTemplate:
  enabled: true
  name: code-guardian
  image: "humr-example-agent:latest"
  description: "Persistent agent for repo monitoring"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"
