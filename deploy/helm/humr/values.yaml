# -- Target namespace for agent workloads (instances, templates, schedules)
agentNamespace: humr-agents

# -- OneCLI (credential proxy — gateway + web run in a single container)
onecli:
  # Single Docker image containing both Rust gateway and Node.js web app
  image: ghcr.io/onecli/onecli@sha256:84fdc6c7013f25c873e1bb540be41444ad26cd8d8ae61a0953f202f8f531a8f9
  replicas: 1

  # -- PostgreSQL configuration (OneCLI dependency)
  postgres:
    image: postgres:18-alpine
    user: onecli
    # password is auto-generated if not set
    password: ""
    database: onecli
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # -- Gateway settings (Rust binary, runs inside the OneCLI container)
  gateway:
    port: 10255
    # secretEncryptionKey: base64-encoded 32-byte key, auto-generated if not set
    secretEncryptionKey: ""

  # -- Web app settings (Node.js, runs inside the OneCLI container)
  # Runs in local mode (no OAuth). Set NEXTAUTH_SECRET + GOOGLE_CLIENT_ID +
  # GOOGLE_CLIENT_SECRET in env to enable OAuth.
  web:
    port: 10254

  # -- Self-signed CA for MITM TLS
  ca:
    commonName: "Humr OneCLI CA"
    validity: 3650

  # -- Combined container resources
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Ingress (uses k3s built-in Traefik, accessed via port-forward on port 4444)
# Subdomains: humr.localtest.me:4444 (UI), humr-api.localtest.me:4444 (API), onecli.localtest.me:4444 (OneCLI)
ingress:
  enabled: true
  className: ""
  annotations: {}

# -- UI (nginx serving static SPA, reverse-proxies /api to API server)
ui:
  image: humr-ui:latest
  imagePullPolicy: Never
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- API Server
apiServer:
  image: humr-api-server:latest
  imagePullPolicy: Never
  port: 4000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Controller (Go reconciler + scheduler)
controller:
  image: humr-controller:latest
  imagePullPolicy: Never
  agentImagePullPolicy: Never
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Default agent template
defaultTemplate:
  enabled: true
  name: code-guardian
  image: "humr-example-agent:latest"
  description: "Persistent agent for repo monitoring"
