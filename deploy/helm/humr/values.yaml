# -- Base domain for all services (subdomains: humr., humr-api., keycloak., onecli.)
# Override for production, e.g. "example.com"
domain: localhost
# -- Port appended to public URLs (empty for standard 80/443)
port: "4444"
# -- URL scheme (http for local dev, https for production)
scheme: http

# -- Pull secrets for all pods managed by this chart.
# Agent pods (managed by the controller) also inherit these secrets.
# Example:
#   imagePullSecrets:
#     - name: my-registry-secret
imagePullSecrets: []

# -- Target namespace for agent workloads (instances, templates, schedules)
agentNamespace: humr-agents

# -- Whether to create the agent namespace (disable if it already exists or is managed externally)
createAgentNamespace: true

# -- Shared local PostgreSQL instance
# Set enabled: false when using external/cloud DBs for all services.
postgres:
  enabled: true
  image: postgres:18-alpine
  user: humr
  # password is auto-generated if not set
  password: ""
  storage: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- OneCLI (credential proxy — gateway + web run in a single container)
onecli:
  # Single Docker image containing both Rust gateway and Node.js web app
  image: ghcr.io/kagenti/onecli:0.0.8
  replicas: 1

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: humr
    password: ""
    database: onecli

  # -- Gateway settings (Rust binary, runs inside the OneCLI container)
  gateway:
    port: 10255
    # secretEncryptionKey: base64-encoded 32-byte key, auto-generated if not set
    secretEncryptionKey: ""

  # -- Web app settings (Node.js, runs inside the OneCLI container)
  web:
    port: 10254

  # -- OAuth / OIDC configuration (requires keycloak.enabled: true)
  # AUTH_MODE is set automatically: "oauth" when keycloak is enabled, "local" otherwise.
  oauth:
    clientId: onecli
    # clientSecret: auto-generated if not set, must match Keycloak client config
    clientSecret: ""
    audience: onecli
    # nextAuthSecret: auto-generated if not set
    nextAuthSecret: ""

  # -- GitHub OAuth App credentials (shared across all users).
  # Register a GitHub OAuth App and set these to enable "Connect GitHub" for all users.
  # Callback URL in form `{onecli external URL}/api/apps/github/callback` 
  # which has to be set up in the gh OAuth app can be found in the onecli ui under the GitHub app
  github:
    clientId: ""
    clientSecret: ""

  # -- MITM CA: auto-generated by OneCLI gateway on first start.
  # Agent pods fetch the CA cert at startup via init container.
  data:
    size: 1Gi

  # -- Egress NetworkPolicy for the OneCLI pod.
  # Prevents an SSRF gadget: without this, an agent can use the proxy to reach
  # in-cluster targets (Kubernetes API, kubelet, other pods, cloud metadata).
  # Allows: DNS, in-cluster Postgres/Keycloak by component label, and the
  # public internet (0.0.0.0/0 with private/special-use ranges excepted).
  networkPolicy:
    enabled: true
    # -- Cluster service CIDR. Set this when your CNI evaluates egress
    # NetworkPolicy before DNAT (e.g. OVN-Kubernetes on OpenShift). Without
    # this, podSelector-based allow rules won't match traffic sent to service
    # ClusterIPs, and blockedCIDRs will block them.
    # Common values: "10.43.0.0/16" (k3s), "172.30.0.0/16" (OpenShift)
    serviceCIDR: ""
    # Private and special-use IPv4 ranges blocked from gateway egress.
    # Covers all RFC1918, CGNAT, link-local (cloud metadata), loopback, and
    # IETF reserved space — so it's correct on any cluster regardless of which
    # CIDRs the CNI assigned to pods/services.
    # If you need to reach a private network (VPC peering, on-prem VPN), remove
    # the relevant range here.
    blockedCIDRs:
      - 10.0.0.0/8       # RFC1918 — covers k3s pod/service CIDRs and most cluster CNIs
      - 172.16.0.0/12    # RFC1918 — Docker default, kubeadm common range
      - 192.168.0.0/16   # RFC1918
      - 100.64.0.0/10    # RFC6598 carrier-grade NAT (used by EKS for pods)
      - 169.254.0.0/16   # link-local + cloud metadata (AWS/GCP/Azure IMDS at 169.254.169.254)
      - 127.0.0.0/8      # loopback (note: doesn't block in-pod loopback — kernel bypasses CNI)
      - 0.0.0.0/8        # IETF "this network"
      - 224.0.0.0/4      # multicast
      - 240.0.0.0/4      # IETF reserved

  # -- Force local auth mode (skip NEXTAUTH_SECRET injection).
  # Useful for test clusters where OneCLI doesn't have a browser-based OAuth provider.
  forceLocalAuth: false

  # -- Combined container resources
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Keycloak (OIDC identity provider)
keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak:26.5.4
  configCliImage: adorsys/keycloak-config-cli:latest-26.5.4
  provisionImage: curlimages/curl:8.19.0
  port: 8080

  # -- Admin credentials (for Keycloak admin console)
  admin:
    user: admin
    # password is auto-generated if not set
    password: ""

  # -- Realm and OIDC client configuration
  realm: humr
  clientId: humr-ui
  apiAudience: humr-api
  # -- Realm role required to access the API. Users without this role get 403.
  # Leave empty to allow all authenticated users.
  requiredRole: ""
  # -- Confidential client for API server (token exchange with OneCLI)
  apiClientId: humr-api
  apiClientSecret: ""
  # -- Confidential client for controller (impersonation via token exchange)
  controllerClientId: humr-controller
  controllerClientSecret: ""

  # -- Test user bootstrapped via realm import.
  # DISABLED by default — production deployments must not ship a known credential.
  # Local dev and e2e tests (via values-local.yaml) enable it.
  testUser:
    enabled: false
    username: ""
    password: ""

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: humr
    password: ""
    database: keycloak

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Ingress (hostnames derived from domain value above)
# Additional alias domains for local dev (e.g. *.localtest.me for secure context)
ingress:
  enabled: true
  className: ""
  annotations: {}
  # -- Extra alias domains that mirror all subdomain routes (hostname only, no port)
  aliasDomains: ["localtest.me"]
  tls: []
  # For production with TLS:
  #   aliasDomains: []
  #   tls:
  #     - secretName: humr-tls
  #       hosts: ["humr.example.com", "humr-api.example.com", "keycloak.example.com", "onecli.example.com"]

# -- UI (nginx serving static SPA, reverse-proxies /api to API server)
ui:
  image:
    repository: ghcr.io/kagenti/humr/ui
    tag: ""  # defaults to appVersion
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- API Server
apiServer:
  image:
    repository: ghcr.io/kagenti/humr/api-server
    tag: ""
    pullPolicy: IfNotPresent
  port: 4000
  # -- Slack bot token (xoxb-...) for the platform-wide Slack app. Leave empty to disable Slack integration.
  slackBotToken: ""
  # -- Slack app-level token (xapp-...) for Socket Mode. Required alongside slackBotToken.
  slackAppToken: ""

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: humr
    password: ""
    database: humr
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Controller (Go reconciler + scheduler)
controller:
  image:
    repository: ghcr.io/kagenti/humr/controller
    tag: ""
    pullPolicy: IfNotPresent
  caCertInitImage: busybox:stable
  agentImagePullPolicy: IfNotPresent
  # -- Pull secrets for agent pods (in agentNamespace, separate from chart-level imagePullSecrets).
  # The referenced secrets must exist in agentNamespace.
  agentImagePullSecrets: []
  replicas: 1
  # -- Idle timeout before auto-hibernating running instances (Go duration, 0 = disabled)
  idleTimeout: "1h"
  # -- Termination grace period in seconds for agent pods
  terminationGracePeriod: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Default agent template
defaultTemplate:
  enabled: true
  name: code-guardian
  image:
    repository: ghcr.io/kagenti/humr/example-agent
    tag: ""
    pullPolicy: IfNotPresent
  description: "Persistent agent for repo monitoring"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"
