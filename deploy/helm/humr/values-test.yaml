# Reduced resource requests for e2e test clusters (2-3 GiB VMs).
# Used via: helm install -f values-test.yaml
postgres:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

onecli:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

keycloak:
  # E2E tests log in as dev/dev — never enabled in production.
  testUser:
    enabled: true
    username: dev
    password: dev
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ui:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

apiServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

controller:
  # values-local.yaml sets Never so dev-loop :latest images are picked up
  # without accidental registry pulls. e2e tests create agents with arbitrary
  # images (e.g. alpine:latest) that aren't preloaded, so fall back to
  # IfNotPresent so k3s can pull them on demand.
  agentImagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

defaultTemplate:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
