---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adk.web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adk.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.onecli.web.port }}
      targetPort: {{ .Values.onecli.web.port }}
      protocol: TCP
      name: web
  selector:
    app.kubernetes.io/component: web
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adk.web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adk.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.onecli.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: web
          image: {{ .Values.onecli.web.image }}
          ports:
            - containerPort: {{ .Values.onecli.web.port }}
              name: web
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "adk.secrets.fullname" . }}
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: {{ include "adk.postgres.dsn" . | quote }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "adk.secrets.fullname" . }}
                  key: NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              value: {{ .Values.onecli.web.nextauthUrl | quote }}
            - name: PORT
              value: {{ .Values.onecli.web.port | quote }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.onecli.web.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.onecli.web.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.onecli.web.resources | nindent 12 }}
