{{- $caSecretName := include "adk.ca.fullname" . }}
{{- $caCertCMName := include "adk.ca-cert.fullname" . }}
---
# Self-signed CA issuer
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $caSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adk.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
# CA certificate — cert-manager creates Secret "{{ $caSecretName }}" with tls.crt + tls.key
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $caSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adk.labels" . | nindent 4 }}
spec:
  isCA: true
  commonName: {{ .Values.onecli.ca.commonName }}
  secretName: {{ $caSecretName }}
  duration: {{ mul .Values.onecli.ca.validity 24 }}h
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
  issuerRef:
    name: {{ $caSecretName }}
    kind: Issuer
---
# Public CA cert in agent namespace — agent pods mount this for TLS trust
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $caCertCMName }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "adk.labels" . | nindent 4 }}
data:
  {{- $existingCA := lookup "v1" "Secret" .Release.Namespace $caSecretName }}
  {{- if $existingCA }}
  ca.crt: |
    {{ index $existingCA.data "tls.crt" | b64dec | nindent 4 }}
  {{- else }}
  ca.crt: "# Populated after cert-manager issues the certificate"
  {{- end }}
