["helm:check"]
depends = ["helm:check:*"]

["helm:check:lint"]
dir = "{{config_root}}/deploy/helm/adk"
run = "helm lint ."

["helm:check:render"]
dir = "{{config_root}}/deploy/helm/adk"
run = "helm template adk . | kubeconform -strict -summary"

["helm:setup"]
alias = "helm:build"
run = "echo 'No build step for helm chart'"
