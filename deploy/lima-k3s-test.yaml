images:
  - location: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-arm64.img
    arch: aarch64
  - location: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img
    arch: x86_64

cpus: 2
memory: 3GiB
disk: 20GiB

provision:
  - mode: system
    script: |
      #!/bin/sh
      mkdir -p /etc/rancher/k3s
      cat > /etc/rancher/k3s/config.yaml << 'EOF'
      kubelet-arg:
        - "container-log-max-size=10Mi"
        - "container-log-max-files=3"
      EOF
      if [ ! -d /var/lib/rancher/k3s ]; then
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --https-listen-port 16445" sh -
      fi
      mkdir -p /var/lib/rancher/k3s/server/manifests
      cat > /var/lib/rancher/k3s/server/manifests/traefik-config.yaml << 'EOF'
      apiVersion: helm.cattle.io/v1
      kind: HelmChartConfig
      metadata:
        name: traefik
        namespace: kube-system
      spec:
        valuesContent: |
          ports:
            humr:
              port: 5555
              expose:
                default: true
              exposedPort: 5555
              protocol: TCP
      EOF

probes:
  - mode: readiness
    description: k3s is ready
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until test -f /etc/rancher/k3s/k3s.yaml; do sleep 3; done"; then
        echo >&2 "k3s is not running yet"
        exit 1
      fi

copyToHost:
  - guest: /etc/rancher/k3s/k3s.yaml
    host: "{{.Dir}}/copied-from-guest/kubeconfig.yaml"
    deleteOnStop: true

portForwards:
  - guestPort: 5555
    hostPort: 5555
  - guestPort: 16445
    hostPort: 16445

message: |
  Test k3s cluster is ready. Access services via port 5555.
  KUBECONFIG: {{.Dir}}/copied-from-guest/kubeconfig.yaml
