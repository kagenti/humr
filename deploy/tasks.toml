# -- Shell environment --

["cluster:kubeconfig"]
description = 'Print the KUBECONFIG path for the cluster. Usage: export KUBECONFIG="$(mise run cluster:kubeconfig)"'
quiet = true
run = '''
#!/usr/bin/env bash
if [ -n "${IS_SANDBOX:-}" ]; then
  echo "/etc/rancher/k3s/k3s.yaml"
else
  echo "$HOME/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"
fi
'''

["cluster:env"]
description = 'Open a subshell with env for local cluster'
quiet = true
raw = true
run = '''                                                                                                                                                                                                                                                                                                                                                                                              
#!/usr/bin/env bash

export KUBECONFIG="$(mise run cluster:kubeconfig)"

CALLER=$(ps -o comm= -p $(ps -o ppid= -p $PPID) 2>/dev/null)
CALLER="${CALLER:-$SHELL}"
case "$(basename "$CALLER")" in
  bash) exec bash --rcfile <(echo 'source ~/.bashrc; PS1="(humr) $PS1"') ;;
  zsh)
    ZDOTDIR=$(mktemp -d)
    cat > "$ZDOTDIR/.zshrc" <<'ZRC'
[[ -f ~/.zshenv ]] && source ~/.zshenv
[[ -f ~/.zshrc ]]  && source ~/.zshrc
PS1="(humr) $PS1"
command rm -rf "$ZDOTDIR"
ZRC
    export ZDOTDIR
    exec zsh
    ;;
  fish) exec fish -C 'functions -c fish_prompt _orig_fish_prompt; function fish_prompt; echo -n "(humr) "; _orig_fish_prompt; end' ;;
  *)    exec "$CALLER" ;;
esac
'''


# -- Image builds (docker only, no k3s interaction) --

["image:apiserver"]
description = "Build api-server Docker image"
dir = "{{config_root}}"
run = 'docker build -f packages/api-server/Dockerfile -t humr-api-server:latest .'

["image:ui"]
description = "Build UI Docker image"
dir = "{{config_root}}"
run = 'docker build -f packages/ui/Dockerfile -t humr-ui:latest .'

["image:agent"]
description = "Build agent Docker images (humr-base + claude-code + google-workspace + pi-agent)"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail
docker build -f packages/humr-base/Dockerfile -t humr-base .
docker build -t humr-claude-code:latest packages/agents/claude-code
docker build -t humr-google-workspace-agent:latest packages/agents/google-workspace
docker build -t humr-pi-agent:latest packages/agents/pi-agent
'''

# -- Cluster lifecycle (k3s via lima) --
#
# When IS_SANDBOX is set, it is assumed we are already _inside_ a VM.
#
# Both install and upgrade share the same flow:
#   ensure VM/k3s → cert-manager → build images → load into k3s → helm install/upgrade
#
# install: provisions VM/k3s if needed, uses helm install
# upgrade: assumes VM/k3s exists, uses helm upgrade

["cluster:install"]
description = "Create k3s cluster, build images, install cert-manager + Humr chart. Options: --vm-name=NAME --lima-template=PATH --helm-values=PATH --set=key=val --no-restart"
depends = ["image:apiserver", "image:ui", "image:agent"]
dir = "{{config_root}}"
raw = true
run = '''
#!/usr/bin/env bash
set -eo pipefail

LIMA_INSTANCE="humr-k3s"
LIMA_TEMPLATE="deploy/lima-k3s.yaml"
HELM_VALUES=""
HELM_EXTRA_ARGS=()
NO_RESTART=false
DEV_VALUES="deploy/helm/humr/values-dev.yaml"
for arg in "$@"; do
  case "$arg" in
    --vm-name=*) LIMA_INSTANCE="${arg#--vm-name=}" ;;
    --lima-template=*) LIMA_TEMPLATE="${arg#--lima-template=}" ;;
    --helm-values=*) HELM_VALUES="${arg#--helm-values=}" ;;
    --set=*) HELM_EXTRA_ARGS+=("$arg") ;;
    --no-restart) NO_RESTART=true ;;
  esac
done

# 1. Provision cluster and set KUBECONFIG
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
  if [ ! -d /var/lib/rancher/k3s ]; then
    echo "Provisioning k3s on host (sandbox mode)..."
    for i in $(seq 0 $(($(yq '.provision | length' "$LIMA_TEMPLATE") - 1))); do
      yq ".provision[$i].script" "$LIMA_TEMPLATE" | sudo bash
    done
  fi
  echo "Waiting for k3s to be ready..."
  timeout 120 bash -c "until [ -f $KUBECONFIG ]; do sleep 2; done"
else
  KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"
  if ! limactl list -q 2>/dev/null | grep -qx "$LIMA_INSTANCE"; then
    echo "Creating k3s VM ($LIMA_INSTANCE)..."
    limactl create --name="$LIMA_INSTANCE" "$LIMA_TEMPLATE" --tty=false
  fi
  STATUS=$(limactl list --json | python3 -c "import sys,json; [print(json.loads(l)['status']) for l in sys.stdin if json.loads(l)['name']=='$LIMA_INSTANCE']" 2>/dev/null || echo "Stopped")
  if [ "$STATUS" != "Running" ]; then
    echo "Starting k3s VM..."
    limactl start "$LIMA_INSTANCE"
  fi
  echo "Waiting for k3s to be ready..."
fi
kubectl --kubeconfig="$KUBECONFIG" wait --for=condition=Ready node --all --timeout=120s

# 2. Install cert-manager
if ! kubectl --kubeconfig="$KUBECONFIG" get ns cert-manager >/dev/null 2>&1; then
  echo "Installing cert-manager..."
  kubectl --kubeconfig="$KUBECONFIG" apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
  echo "Waiting for cert-manager to be ready..."
  kubectl --kubeconfig="$KUBECONFIG" -n cert-manager wait --for=condition=Available deployment --all --timeout=120s
else
  echo "cert-manager already installed"
fi

# 3. Load images into k3s (built by depends: image:*)
echo "Loading images into k3s..."
tar="/tmp/humr-images.tar"
docker save -o "$tar" humr-api-server:latest humr-ui:latest humr-claude-code:latest humr-google-workspace-agent:latest humr-pi-agent:latest
if [ -n "${IS_SANDBOX:-}" ]; then
  docker image prune --all --force >/dev/null 2>&1 || true
  sudo k3s ctr images import "$tar"
else
  limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
  limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
fi
rm -f "$tar"

# 4. Helm install or upgrade
# Dev-cluster defaults (overridable via --set)
DEV_DEFAULTS=(--set keycloak.admin.password=admin)

echo "Installing/upgrading Humr chart..."
# No --wait: the keycloak-provision post-install hook imports the humr realm,
# which OneCLI's wait-for-keycloak init container depends on. With --wait,
# helm would block on OneCLI readiness before the hook ever runs → deadlock.
if [ -z "$HELM_VALUES" ] && [ -f "$DEV_VALUES" ]; then
    HELM_VALUES="$DEV_VALUES"
    echo "Using dev overrides: $DEV_VALUES"
  fi
  helm --kubeconfig="$KUBECONFIG" upgrade --install humr deploy/helm/humr -f deploy/helm/humr/values-local.yaml --timeout 15m ${HELM_VALUES:+-f "$HELM_VALUES"} "${DEV_DEFAULTS[@]}" "${HELM_EXTRA_ARGS[@]}"

# 5. Restart pods to pick up new local images (dev only — :latest tags don't trigger rollout)
if [ "$NO_RESTART" = true ]; then
  echo "Skipping pod restart (--no-restart)"
else
  echo "Restarting pods..."
  kubectl --kubeconfig="$KUBECONFIG" rollout restart deployment humr-apiserver humr-ui
fi

# 6. Wait for all Humr deployments to become Available (replaces helm --wait,
# but happens AFTER post-install hooks have run, so no deadlock).
echo "Waiting for deployments to be ready..."
kubectl --kubeconfig="$KUBECONFIG" wait --for=condition=Available deployment --all --timeout=10m

echo ""
echo "=== Cluster ready ==="
echo "KUBECONFIG=$KUBECONFIG"
echo ""
kubectl --kubeconfig="$KUBECONFIG" get pods
'''

["cluster:build-apiserver"]
description = "Build and load API server image into k3s, restart apiserver pod"
depends = ["image:apiserver"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail

echo "Loading into k3s..."
tar="/tmp/humr-api-server.tar"
docker save humr-api-server:latest -o "$tar"

if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
  sudo k3s ctr images import "$tar"
else
  LIMA_INSTANCE="humr-k3s"
  KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"
  limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
  limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
fi
rm -f "$tar"

echo "Restarting apiserver pod..."
kubectl --kubeconfig="$KUBECONFIG" rollout restart deployment humr-apiserver
kubectl --kubeconfig="$KUBECONFIG" rollout status deployment humr-apiserver --timeout=60s

echo "Done."
'''

["cluster:build-ui"]
description = "Build and load UI image into k3s, restart UI pod"
depends = ["image:ui"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail

echo "Loading into k3s..."
tar="/tmp/humr-ui.tar"
docker save humr-ui:latest -o "$tar"

if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
  sudo k3s ctr images import "$tar"
else
  LIMA_INSTANCE="humr-k3s"
  KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"
  limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
  limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
fi
rm -f "$tar"

echo "Restarting UI pod..."
kubectl --kubeconfig="$KUBECONFIG" rollout restart deployment humr-ui
kubectl --kubeconfig="$KUBECONFIG" rollout status deployment humr-ui --timeout=60s

echo "Done."
'''

["cluster:build-agent"]
description = "Build and load agent images into k3s, restart agent pods"
depends = ["image:agent"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail

echo "Loading into k3s..."
tar="/tmp/humr-agent-images.tar"
docker save humr-claude-code:latest humr-google-workspace-agent:latest humr-pi-agent:latest -o "$tar"

if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
  sudo k3s ctr images import "$tar"
else
  LIMA_INSTANCE="humr-k3s"
  KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"
  limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
  limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
fi
rm -f "$tar"

echo "Restarting agent pods..."
kubectl --kubeconfig="$KUBECONFIG" delete pods -n humr-agents --all 2>/dev/null || true

echo "Done. Agent pods will restart with new image."
'''

["cluster:kubectl"]
description = "Run kubectl against the humr-k3s cluster. Usage: mise run cluster:kubectl -- get pods"
raw = true
run = '''
#!/usr/bin/env bash
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
else
  KUBECONFIG="$HOME/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"
fi
exec kubectl --kubeconfig="$KUBECONFIG" "$@"
'''

["cluster:shell"]
description = "Open a shell inside the k3s VM (or run command directly in sandbox mode)"
raw = true
run = '''
#!/usr/bin/env bash
if [ -n "${IS_SANDBOX:-}" ]; then
  if [ $# -eq 0 ]; then
    exec bash
  else
    exec "$@"
  fi
else
  exec limactl shell humr-k3s "$@"
fi
'''

["cluster:stop"]
description = "Stop the k3s VM (preserves data)"
run = '''
#!/usr/bin/env bash
set -eo pipefail
if [ -n "${IS_SANDBOX:-}" ]; then
  sudo systemctl stop k3s
else
  limactl stop humr-k3s
fi
'''

["cluster:uninstall"]
description = "Uninstall Humr chart and clean up all resources"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
else
  KUBECONFIG="$HOME/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"
fi
helm --kubeconfig="$KUBECONFIG" uninstall humr || true
kubectl --kubeconfig="$KUBECONFIG" delete pvc --all 2>/dev/null || true
kubectl --kubeconfig="$KUBECONFIG" delete ns humr-agents --ignore-not-found 2>/dev/null || true
echo "Humr uninstalled and cleaned up. Use 'mise run cluster:delete' to remove the entire cluster."
'''

["cluster:delete"]
description = "Delete the entire k3s cluster (destroys all data). Options: --vm-name=NAME --force"
raw = true
run = '''
#!/usr/bin/env bash
set -eo pipefail

LIMA_INSTANCE="humr-k3s"
FORCE=false
for arg in "$@"; do
  case "$arg" in
    --vm-name=*) LIMA_INSTANCE="${arg#--vm-name=}" ;;
    --force) FORCE=true ;;
  esac
done

if [ "$FORCE" != "true" ]; then
  if [ -n "${IS_SANDBOX:-}" ]; then
    echo "This will uninstall k3s and delete all cluster data."
  else
    echo "This will delete the k3s VM ($LIMA_INSTANCE) and all cluster data."
  fi
  read -p "Continue? [y/N] " -r
  if [[ ! $REPLY =~ ^[Yy]$ ]]; then
    echo "Cancelled."
    exit 0
  fi
fi

if [ -n "${IS_SANDBOX:-}" ]; then
  /usr/local/bin/k3s-uninstall.sh 2>/dev/null || true
  echo "k3s uninstalled from host."
else
  limactl delete --force "$LIMA_INSTANCE" 2>/dev/null || true
  echo "k3s cluster ($LIMA_INSTANCE) deleted."
fi
'''

["cluster:status"]
description = "Show cluster and pod status. Options: --watch (continuous refresh every 2s)"
raw = true
run = '''
#!/usr/bin/env bash
set -eo pipefail
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
else
  KUBECONFIG="$HOME/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"
fi

STATUS_CMD="
if [ -n \"${IS_SANDBOX:-}\" ]; then
  echo '=== k3s service ==='
  sudo systemctl is-active k3s || true
else
  echo '=== Lima VM ==='
  limactl list
fi
echo ''
echo '=== Nodes ==='
kubectl --kubeconfig='$KUBECONFIG' get nodes 2>/dev/null || echo 'Cluster not reachable'
echo ''
echo '=== Pods (default) ==='
kubectl --kubeconfig='$KUBECONFIG' get pods 2>/dev/null || true
echo ''
echo '=== Pods (humr-agents) ==='
kubectl --kubeconfig='$KUBECONFIG' get pods -n humr-agents 2>/dev/null || true
"

case "${1:-}" in
  --watch|-w)
    tput civis 2>/dev/null
    trap 'tput cnorm 2>/dev/null; exit' INT TERM
    while true; do
      tput home 2>/dev/null
      eval "$STATUS_CMD" | sed $'s/$/\033[K/'
      tput ed 2>/dev/null
      sleep 0.5
    done
    ;;
  *) eval "$STATUS_CMD" ;;
esac
'''


["cluster:logs"]
description = "Show OneCLI pod logs"
run = '''
#!/usr/bin/env bash
set -eo pipefail
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
else
  KUBECONFIG="$HOME/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"
fi
kubectl --kubeconfig="$KUBECONFIG" logs -l app.kubernetes.io/component=onecli --all-containers --tail=50
'''
