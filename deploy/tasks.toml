# -- Shell environment --

["humr:shell"]
description = 'Print shell activation script. Usage: eval "$(mise run humr:shell)"'
dir = "{{cwd}}"
quiet = true
run = """
cat <<EOF
deactivate () {
  export PS1="\\${__OLD_PS1:-}"
  [[ -n "\\${__OLD_KUBECONFIG:-}" ]] && export KUBECONFIG="\\$__OLD_KUBECONFIG" || unset KUBECONFIG
  unset __OLD_PS1
  unset __OLD_KUBECONFIG
  unset -f deactivate
  echo "humr-k3s environment deactivated."
}

while [[ -n "\\${__OLD_PS1:-}" ]]; do
  deactivate;
done

echo "Activating humr-k3s environment..."

export __OLD_PS1="\\${PS1:-}"
export __OLD_KUBECONFIG="\\${KUBECONFIG:-}"

export KUBECONFIG="\\${HOME}/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"
export PS1="(humr-k3s) \\${__OLD_PS1}"
EOF
"""

# -- Image builds (docker only, no k3s interaction) --

["image:controller"]
description = "Build controller Docker image"
dir = "{{config_root}}"
run = 'docker build -t humr-controller:latest packages/controller/'

["image:apiserver"]
description = "Build api-server Docker image"
dir = "{{config_root}}"
run = 'docker build -f packages/api-server/Dockerfile -t humr-api-server:latest .'

["image:ui"]
description = "Build UI Docker image"
dir = "{{config_root}}"
run = 'docker build -f packages/ui/Dockerfile -t humr-ui:latest .'

["image:agent"]
description = "Build agent Docker image (agent-runtime + example-agent)"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail
docker build -f packages/humr-base/Dockerfile -t humr-base .
docker build -t humr-example-agent:latest packages/example-agent
'''

# -- Cluster lifecycle (k3s via lima) --
#
# Both install and upgrade share the same flow:
#   ensure VM → cert-manager → build images → load into k3s → helm install/upgrade
#
# install: creates VM if needed, uses helm install
# upgrade: assumes VM exists, uses helm upgrade

["cluster:install"]
description = "Create k3s cluster, build images, install cert-manager + Humr chart. Options: --vm-name=NAME --lima-template=PATH --helm-values=PATH --set key=val"
depends = ["image:controller", "image:apiserver", "image:ui", "image:agent"]
dir = "{{config_root}}"
raw = true
run = '''
#!/usr/bin/env bash
set -eo pipefail

LIMA_INSTANCE="humr-k3s"
LIMA_TEMPLATE="deploy/lima-k3s.yaml"
HELM_VALUES=""
HELM_EXTRA_ARGS=()
NEXT_IS_SET_VALUE=false
for arg in "$@"; do
  if $NEXT_IS_SET_VALUE; then
    HELM_EXTRA_ARGS+=("$arg")
    NEXT_IS_SET_VALUE=false
    continue
  fi
  case "$arg" in
    --vm-name=*) LIMA_INSTANCE="${arg#--vm-name=}" ;;
    --lima-template=*) LIMA_TEMPLATE="${arg#--lima-template=}" ;;
    --helm-values=*) HELM_VALUES="${arg#--helm-values=}" ;;
    --set) HELM_EXTRA_ARGS+=("--set"); NEXT_IS_SET_VALUE=true ;;
    --set=*) HELM_EXTRA_ARGS+=("$arg") ;;
  esac
done
KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"

# 1. Ensure k3s VM is running
if ! limactl list --json | grep -q "\"name\":\"$LIMA_INSTANCE\""; then
  echo "Creating k3s VM ($LIMA_INSTANCE)..."
  limactl create --name=$LIMA_INSTANCE "$LIMA_TEMPLATE" --tty=false
fi

STATUS=$(limactl list --json | python3 -c "import sys,json; [print(json.loads(l)['status']) for l in sys.stdin if json.loads(l)['name']=='$LIMA_INSTANCE']" 2>/dev/null || echo "Stopped")
if [ "$STATUS" != "Running" ]; then
  echo "Starting k3s VM..."
  limactl start $LIMA_INSTANCE
fi

echo "Waiting for k3s to be ready..."
kubectl --kubeconfig="$KUBECONFIG" wait --for=condition=Ready node --all --timeout=120s

# 2. Install cert-manager
if ! kubectl --kubeconfig="$KUBECONFIG" get ns cert-manager >/dev/null 2>&1; then
  echo "Installing cert-manager..."
  kubectl --kubeconfig="$KUBECONFIG" apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
  echo "Waiting for cert-manager to be ready..."
  kubectl --kubeconfig="$KUBECONFIG" -n cert-manager wait --for=condition=Available deployment --all --timeout=120s
else
  echo "cert-manager already installed"
fi

# 3. Load images into k3s (built by depends: image:*)
echo "Loading images into k3s..."
for img in humr-controller:latest humr-api-server:latest humr-ui:latest humr-example-agent:latest; do
  tar="/tmp/${img%%:*}.tar"
  docker save "$img" -o "$tar"
  limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
  limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
  rm -f "$tar"
done

# 4. Helm install or upgrade
HELM_VALUES_FLAG=""
if [ -n "$HELM_VALUES" ]; then
  HELM_VALUES_FLAG="-f $HELM_VALUES"
fi
if helm --kubeconfig="$KUBECONFIG" status humr >/dev/null 2>&1; then
  echo "Upgrading Humr chart..."
  helm --kubeconfig="$KUBECONFIG" upgrade humr deploy/helm/humr -f deploy/helm/humr/values-local.yaml $HELM_VALUES_FLAG "${HELM_EXTRA_ARGS[@]}"
else
  echo "Installing Humr chart..."
  helm --kubeconfig="$KUBECONFIG" install humr deploy/helm/humr -f deploy/helm/humr/values-local.yaml $HELM_VALUES_FLAG "${HELM_EXTRA_ARGS[@]}"
fi

# 5. Restart pods to pick up new local images (dev only — :latest tags don't trigger rollout)
echo "Restarting pods..."
kubectl --kubeconfig="$KUBECONFIG" rollout restart deployment humr-controller humr-apiserver humr-ui humr-onecli
kubectl --kubeconfig="$KUBECONFIG" rollout status deployment humr-onecli --timeout=120s
kubectl --kubeconfig="$KUBECONFIG" rollout status deployment humr-controller --timeout=60s
kubectl --kubeconfig="$KUBECONFIG" rollout status deployment humr-apiserver --timeout=60s
kubectl --kubeconfig="$KUBECONFIG" rollout status deployment humr-ui --timeout=60s

echo ""
echo "=== Cluster ready ==="
echo "KUBECONFIG=$KUBECONFIG"
echo ""
kubectl --kubeconfig="$KUBECONFIG" get pods
'''

["cluster:build-ui"]
description = "Build and load UI image into k3s, restart UI pod"
depends = ["image:ui"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail

LIMA_INSTANCE="humr-k3s"
KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"

echo "Loading into k3s..."
tar="/tmp/humr-ui.tar"
docker save humr-ui:latest -o "$tar"
limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
rm -f "$tar"

echo "Restarting UI pod..."
kubectl --kubeconfig="$KUBECONFIG" rollout restart deployment humr-ui
kubectl --kubeconfig="$KUBECONFIG" rollout status deployment humr-ui --timeout=60s

echo "Done."
'''

["cluster:build-agent"]
description = "Build and load agent image into k3s, restart agent pods"
depends = ["image:agent"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail

LIMA_INSTANCE="humr-k3s"
KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"

echo "Loading into k3s..."
tar="/tmp/humr-example-agent.tar"
docker save humr-example-agent:latest -o "$tar"
limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
rm -f "$tar"

echo "Restarting agent pods..."
kubectl --kubeconfig="$KUBECONFIG" delete pods -n humr-agents --all 2>/dev/null || true

echo "Done. Agent pods will restart with new image."
'''

["cluster:kubectl"]
description = "Run kubectl against the humr-k3s cluster. Usage: mise run cluster:kubectl -- get pods"
raw = true
run = '''
#!/usr/bin/env bash
KUBECONFIG="$HOME/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"
exec kubectl --kubeconfig="$KUBECONFIG" "$@"
'''

["cluster:shell"]
description = "Open a shell inside the k3s VM"
raw = true
run = '''
#!/usr/bin/env bash
exec limactl shell humr-k3s "$@"
'''

["cluster:stop"]
description = "Stop the k3s VM (preserves data)"
run = '''
#!/usr/bin/env bash
set -eo pipefail
limactl stop humr-k3s
'''

["cluster:uninstall"]
description = "Uninstall Humr chart and clean up all resources"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail
KUBECONFIG="$HOME/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"
helm --kubeconfig="$KUBECONFIG" uninstall humr || true
kubectl --kubeconfig="$KUBECONFIG" delete pvc --all 2>/dev/null || true
kubectl --kubeconfig="$KUBECONFIG" delete ns humr-agents --ignore-not-found 2>/dev/null || true
echo "Humr uninstalled and cleaned up. Use 'mise run cluster:delete' to remove the entire cluster."
'''

["cluster:delete"]
description = "Delete the entire k3s cluster (destroys all data). Options: --vm-name=NAME --force"
raw = true
run = '''
#!/usr/bin/env bash
set -eo pipefail

LIMA_INSTANCE="humr-k3s"
FORCE=false
for arg in "$@"; do
  case "$arg" in
    --vm-name=*) LIMA_INSTANCE="${arg#--vm-name=}" ;;
    --force) FORCE=true ;;
  esac
done

if [ "$FORCE" != "true" ]; then
  echo "This will delete the k3s VM ($LIMA_INSTANCE) and all cluster data."
  read -p "Continue? [y/N] " -r
  if [[ ! $REPLY =~ ^[Yy]$ ]]; then
    echo "Cancelled."
    exit 0
  fi
fi
limactl delete --force "$LIMA_INSTANCE" 2>/dev/null || true
echo "k3s cluster ($LIMA_INSTANCE) deleted."
'''

["cluster:status"]
description = "Show cluster and pod status. Options: --watch (continuous refresh every 2s)"
raw = true
run = '''
#!/usr/bin/env bash
set -eo pipefail
KUBECONFIG="$HOME/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"

STATUS_CMD="
echo '=== Lima VM ==='
limactl list
echo ''
echo '=== Nodes ==='
kubectl --kubeconfig='$KUBECONFIG' get nodes 2>/dev/null || echo 'Cluster not reachable'
echo ''
echo '=== Pods (default) ==='
kubectl --kubeconfig='$KUBECONFIG' get pods 2>/dev/null || true
echo ''
echo '=== Pods (humr-agents) ==='
kubectl --kubeconfig='$KUBECONFIG' get pods -n humr-agents 2>/dev/null || true
"

case "${1:-}" in
  --watch|-w)
    tput civis 2>/dev/null
    trap 'tput cnorm 2>/dev/null; exit' INT TERM
    while true; do
      tput home 2>/dev/null
      eval "$STATUS_CMD" | sed $'s/$/\033[K/'
      tput ed 2>/dev/null
      sleep 0.5
    done
    ;;
  *) eval "$STATUS_CMD" ;;
esac
'''


["cluster:logs"]
description = "Show OneCLI pod logs"
run = '''
#!/usr/bin/env bash
set -eo pipefail
KUBECONFIG="$HOME/.lima/humr-k3s/copied-from-guest/kubeconfig.yaml"
kubectl --kubeconfig="$KUBECONFIG" logs -l app.kubernetes.io/component=onecli --all-containers --tail=50
'''
