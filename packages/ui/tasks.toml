["ui:setup"]
dir = "{{config_root}}"
depends = ["common:setup:pnpm"]

["ui:check"]
depends = ["ui:check:*"]

["ui:check:tsc"]
dir = "{{config_root}}/packages/ui"
depends = ["ui:setup"]
run = "pnpm exec tsc --noEmit"

["ui:fix"]
run = "echo 'No fix tasks for ui yet'"

["ui:test"]
run = "echo 'No tests for ui yet'"

["ui:run"]
dir = "{{config_root}}"
run = "pnpm ui"

["ui:icons"]
# Rasterize favicon.svg to PWA / apple-touch PNGs with safe-area padding.
dir = "{{config_root}}/packages/ui"
depends = ["ui:setup"]
run = "pnpm exec node scripts/generate-icons.mjs"
