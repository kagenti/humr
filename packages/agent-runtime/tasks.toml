["agent-runtime:setup"]
dir = "{{config_root}}"
depends = ["common:setup:pnpm"]

["agent-runtime:check"]
depends = ["agent-runtime:check:*"]

["agent-runtime:check:tsc"]
dir = "{{config_root}}/packages/agent-runtime"
depends = ["agent-runtime:setup"]
run = "pnpm exec tsc --noEmit"

["agent-runtime:test"]
description = "Run agent-runtime unit tests"
dir = "{{config_root}}"
run = 'pnpm --filter agent-runtime exec vitest run'
