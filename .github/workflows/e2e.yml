name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        env:
          MISE_NODE_VERIFY: "false"
      - run: mise run setup
      - run: mise run check

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Initial checkout required to resolve the local maximize-build-space action.
      - uses: actions/checkout@v4

      - name: Maximize build disk space
        uses: ./.github/actions/maximize-build-space
        with:
          root-reserve-mb: 15360
          temp-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      # Re-checkout — maximize-build-space mounts an LVM volume at $GITHUB_WORKSPACE,
      # replacing the earlier checkout contents.
      - uses: actions/checkout@v4

      - name: Enable KVM + install QEMU
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: jdx/mise-action@v2
        env:
          MISE_NODE_VERIFY: "false"

      - name: Install dependencies
        run: mise run setup

      - name: Run e2e tests
        run: mise run api-server:test

      - name: Teardown test cluster
        if: always()
        run: mise run cluster:delete -- --vm-name=humr-k3s-test --force
