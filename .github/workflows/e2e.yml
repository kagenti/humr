name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU (Lima backend on Linux)
        run: sudo apt-get update && sudo apt-get install -y qemu-system-aarch64 qemu-utils

      - uses: jdx/mise-action@v2
        env:
          MISE_NODE_VERIFY: "false"

      - name: Install dependencies
        run: mise run setup

      - name: Check (lint + typecheck)
        run: mise run check

      - name: Run e2e tests
        run: mise run api-server:test

      - name: Teardown test cluster
        if: always()
        run: mise run cluster:delete -- --vm-name=humr-k3s-test --force
