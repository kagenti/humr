name: Continuous Deployment

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/kagenti/humr
  HELM_RELEASE: humr
  HELM_NAMESPACE: humr

jobs:
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - component: controller
            dockerfile: packages/controller/Dockerfile
            context: packages/controller
          - component: api-server
            dockerfile: packages/api-server/Dockerfile
            context: .
          - component: ui
            dockerfile: packages/ui/Dockerfile
            context: .
          - component: humr-base
            dockerfile: packages/humr-base/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: type=raw,value=main
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  build-example-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/example-agent
          tags: type=raw,value=main
      - uses: docker/build-push-action@v6
        with:
          context: packages/agents/example-agent
          file: packages/agents/example-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/humr-base:main
          cache-from: type=gha,scope=example-agent
          cache-to: type=gha,mode=max,scope=example-agent

  helm-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-images, build-example-agent]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Log in to GHCR OCI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
      - name: Package Helm chart
        run: helm package deploy/helm/humr --version 0.0.0-main --app-version main
      - name: Push to OCI registry
        run: helm push humr-0.0.0-main.tgz oci://ghcr.io/kagenti/humr/charts

  deploy:
    runs-on: arc-runner-set
    timeout-minutes: 10
    needs: helm-package
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Deploy via Helm
        run: helm upgrade ${{ env.HELM_RELEASE }} deploy/helm/humr --namespace ${{ env.HELM_NAMESPACE }} --reuse-values --timeout 5m
      - uses: azure/setup-kubectl@v4
      - name: Wait for rollout
        run: |
          kubectl rollout status statefulset --namespace ${{ env.HELM_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment --namespace ${{ env.HELM_NAMESPACE }} --timeout=5m
